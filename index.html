<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestrator Chwili</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background: #121212; color: #fff; }
        button { background: #4CAF50; color: white; border: none; padding: 15px 20px; font-size: 16px; border-radius: 8px; width: 100%; cursor: pointer; margin-bottom: 20px; }
        button:disabled { background: #555; }
        video { width: 100%; border-radius: 8px; margin-bottom: 10px; background: #000; }
        #status { padding: 10px; background: #333; border-radius: 8px; font-size: 14px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h2>Rejestrator Chwili</h2>
    <video id="camera" autoplay playsinline muted></video>
    <button id="captureBtn">Zarejestruj Chwilę (Zdjęcie, 10s Audio, Metadane)</button>
    <div id="status">Oczekiwanie na akcję...</div>

    <script>
        const video = document.getElementById('camera');
        const captureBtn = document.getElementById('captureBtn');
        const statusDiv = document.getElementById('status');
        
        let mediaRecorder;
        let audioChunks = [];
        let audioStream;

        // Inicjalizacja kamery i mikrofonu
        async function initMedia() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
                video.srcObject = stream;
                audioStream = stream;
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
            } catch (err) {
                statusDiv.innerText = "Błąd dostępu do kamery/mikrofonu: " + err;
            }
        }

        // Zodiak i Rok Chiński
        function getAstrology(date) {
            const d = date.getDate();
            const m = date.getMonth() + 1;
            const y = date.getFullYear();
            
            const zodiacs = ["Koziorożec", "Wodnik", "Ryby", "Baran", "Byk", "Bliźnięta", "Rak", "Lew", "Panna", "Waga", "Skorpion", "Strzelec", "Koziorożec"];
            const lastDays = [19, 18, 20, 19, 20, 20, 22, 22, 22, 22, 21, 21, 19];
            const zodiacSign = d > lastDays[m-1] ? zodiacs[m] : zodiacs[m-1];
            
            const chineseAnimals = ['Małpa', 'Kogut', 'Pies', 'Świnia', 'Szczur', 'Bawół', 'Tygrys', 'Królik', 'Smok', 'Wąż', 'Koń', 'Koza'];
            const chineseYear = chineseAnimals[y % 12];
            
            return { zodiacSign, chineseYear };
        }

        // Faza księżyca (uproszczona)
        function getMoonPhase(date) {
            const lp = 2551443; 
            const now = date.getTime();
            const newMoon = new Date(1970, 0, 7, 20, 35, 0).getTime();
            const phase = ((now - newMoon) / 1000) % lp;
            const days = Math.floor(phase / 86400);
            if(days < 1 || days > 28) return "Nów";
            if(days < 7) return "Przybywający sierp";
            if(days === 7) return "Pierwsza kwadra";
            if(days < 14) return "Garbata przybywająca";
            if(days === 14 || days === 15) return "Pełnia";
            if(days < 22) return "Garbata ubywająca";
            if(days === 22) return "Ostatnia kwadra";
            return "Ubywający sierp";
        }

        // Pora roku i dnia
        function getTimeDetails(date) {
            const m = date.getMonth() + 1;
            const h = date.getHours();
            let season = m >= 3 && m <= 5 ? "Wiosna" : m >= 6 && m <= 8 ? "Lato" : m >= 9 && m <= 11 ? "Jesień" : "Zima";
            let timeOfDay = h >= 5 && h < 8 ? "Świt" : h >= 8 && h < 16 ? "Dzień" : h >= 16 && h < 20 ? "Zmierzch" : "Noc";
            return { season, timeOfDay };
        }

        // Pobieranie pogody (Open-Meteo)
        async function getWeather(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                return data.current_weather ? `${data.current_weather.temperature}°C, Wiatr: ${data.current_weather.windspeed} km/h` : 'Brak danych';
            } catch(e) { return 'Błąd pogody'; }
        }

        // Pobieranie adresu (Nominatim)
        async function getAddress(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
                const data = await res.json();
                return data.address || {};
            } catch(e) { return {}; }
        }

        // Wykonanie pełnego zapisu
        captureBtn.addEventListener('click', async () => {
            captureBtn.disabled = true;
            statusDiv.innerText = "Zbieranie danych z GPS...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const date = new Date();
                
                statusDiv.innerText = "Pobieranie pogody i adresu...";
                const weather = await getWeather(lat, lon);
                const address = await getAddress(lat, lon);
                
                const astro = getAstrology(date);
                const timeDetails = getTimeDetails(date);
                const isDST = date.getTimezoneOffset() < Math.max(new Date(date.getFullYear(), 0, 1).getTimezoneOffset(), new Date(date.getFullYear(), 6, 1).getTimezoneOffset());

                // Formatowanie metadanych
                const metadata = `
=== POZYCJA ===
GPS: ${lat}, ${lon}
Google Maps: https://www.google.com/maps/search/?api=1&query=${lat},${lon}
Ulica/Osiedle: ${address.road || ''} ${address.suburb || ''}
Dzielnica/Miasto: ${address.city_district || ''} ${address.city || address.town || address.village || ''}
Region/Województwo: ${address.state || ''}
Kraj: ${address.country || ''}
Kontynent/Planeta/Układ: Europa, Ziemia, Układ Słoneczny

=== CZAS ===
Data i czas: ${date.toLocaleString('pl-PL')}
Strefa czasowa: ${Intl.DateTimeFormat().resolvedOptions().timeZone}
Zmiana czasu (DST): ${isDST ? "Tak (Czas letni)" : "Nie (Czas standardowy)"}
Pora dnia: ${timeDetails.timeOfDay}
Pora roku: ${timeDetails.season}
Faza księżyca: ${getMoonPhase(date)}
Znak zodiaku: ${astro.zodiacSign}
Rok chiński: ${astro.chineseYear}

=== POGODA ===
Aktualne warunki: ${weather}
                `;

                statusDiv.innerText = "Robienie zdjęcia i nagrywanie audio (10 sekund)...";
                
                // Zrobienie zdjęcia
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const photoDataUrl = canvas.toDataURL('image/jpeg');

                // Nagrywanie audio
                audioChunks = [];
                mediaRecorder.start();
                setTimeout(() => {
                    mediaRecorder.stop();
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        
                        // Pobieranie plików
                        downloadFile(photoDataUrl, `Foto_${date.getTime()}.jpg`);
                        downloadFile(URL.createObjectURL(audioBlob), `Audio_${date.getTime()}.webm`);
                        downloadFile('data:text/plain;charset=utf-8,' + encodeURIComponent(metadata), `Metadane_${date.getTime()}.txt`);
                        
                        statusDiv.innerText = "Gotowe! Pliki zostały zapisane na urządzeniu.\n\n" + metadata;
                        captureBtn.disabled = false;
                    };
                }, 10000);

            }, (err) => {
                statusDiv.innerText = "Błąd GPS: Upewnij się, że masz włączoną lokalizację i przyznałeś uprawnienia.";
                captureBtn.disabled = false;
            }, { enableHighAccuracy: true });
        });

        function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        initMedia();
    </script>
</body>
</html>
