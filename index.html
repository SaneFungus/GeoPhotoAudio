```html
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestrator Chwili ULTIMATE</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background: #0f172a; color: #e2e8f0; }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 5px; }
        p.subtitle { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
        button { background: #0ea5e9; color: white; border: none; padding: 16px 20px; font-size: 16px; font-weight: bold; border-radius: 12px; width: 100%; cursor: pointer; margin-bottom: 20px; transition: background 0.3s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        button:disabled { background: #475569; cursor: not-allowed; color: #94a3b8; }
        video { width: 100%; border-radius: 12px; margin-bottom: 10px; background: #000; border: 2px solid #1e293b; }
        #status { padding: 15px; background: #1e293b; border-radius: 12px; font-size: 13px; white-space: pre-wrap; border-left: 4px solid #38bdf8; line-height: 1.5; height: 200px; overflow-y: auto; }
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>

    <h2>Rejestrator Chwili</h2>
    <p class="subtitle">Wersja Ultimate (8 API Data Sources)</p>
    
    <video id="camera" autoplay playsinline muted></video>
    <button id="captureBtn">Zarejestruj Chwilę (Zdjęcie, 10s Audio, Mega-Metadane)</button>
    <div id="status">Oczekiwanie na akcję... Naciśnij przycisk, aby rozpocząć rejestrację.</div>

    <script>
        const video = document.getElementById('camera');
        const captureBtn = document.getElementById('captureBtn');
        const statusDiv = document.getElementById('status');
        
        let mediaRecorder;
        let audioChunks = [];

        // Pomocnicza funkcja z timeoutem (aby powolne API nie zawiesiło aplikacji)
        const fetchWithTimeout = async (url, timeout = 5000) => {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(id);
            return response;
        };

        // 1. Inicjalizacja Mediów
        async function initMedia() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
                video.srcObject = stream;
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
            } catch (err) {
                statusDiv.innerText = "Błąd dostępu do kamery/mikrofonu: " + err.message;
            }
        }

        // 2. Wikipedia (Historia w promieniu 1km)
        async function getWiki(lat, lon) {
            try {
                const res = await fetchWithTimeout(`https://pl.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=1000&gslimit=4&format=json&origin=*`);
                const data = await res.json();
                if(data.query?.geosearch?.length > 0) return data.query.geosearch.map(i => i.title).join(", ");
                return "Brak istotnych wpisów historycznych w promieniu 1 km.";
            } catch(e) { return "Brak danych z Wikipedii."; }
        }

        // 3. Pogoda kosmiczna (Burze magnetyczne)
        async function getSpaceWeather() {
            try {
                const res = await fetchWithTimeout('https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json');
                const data = await res.json();
                const latest = data[data.length - 1]; // Ostatni odczyt
                const kp = parseFloat(latest[1]);
                let status = kp > 4 ? "Wysoka (Możliwe zakłócenia/Zorza)" : "Spokojna";
                return `Indeks Kp = ${kp} (${status})`;
            } catch(e) { return "Brak łączności z serwerami NOAA."; }
        }

        // 4. Sejsmologia (Trzęsienia ziemi w promieniu 200km z ostatnich 30 dni)
        async function getEarthquake(lat, lon) {
            try {
                let d = new Date(); d.setDate(d.getDate() - 30);
                const dateStr = d.toISOString().split('T')[0];
                const res = await fetchWithTimeout(`https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&latitude=${lat}&longitude=${lon}&maxradiuskm=200&starttime=${dateStr}&limit=1`);
                const data = await res.json();
                if(data.features?.length > 0) {
                    const eq = data.features[0].properties;
                    return `Zanotowano wstrząs: Mag ${eq.mag}, ${eq.place} (${new Date(eq.time).toLocaleDateString()})`;
                }
                return "Brak wstrząsów sejsmicznych w promieniu 200 km (ostatnie 30 dni).";
            } catch(e) { return "Brak danych sejsmicznych."; }
        }

        // 5. Ruch lotniczy (Samoloty w promieniu ~30km)
        async function getFlights(lat, lon) {
            try {
                const box = 0.3; // ok. 30 km odchylenia
                const res = await fetchWithTimeout(`https://opensky-network.org/api/states/all?lamin=${lat-box}&lomin=${lon-box}&lamax=${lat+box}&lomax=${lon+box}`);
                const data = await res.json();
                if(data.states?.length > 0) {
                    return `Wykryto lotów nad głową: ${data.states.length}. Najbliższy lot: ${data.states[0][1]?.trim() || 'Prywatny/Nieznany'}.`;
                }
                return "Czyste niebo - brak samolotów w bezpośrednim zasięgu radaru.";
            } catch(e) { return "Radar lotniczy chwilowo niedostępny (limit zapytań)."; }
        }

        // 6. Dane Słońca (Złota/Niebieska Godzina)
        async function getSun(lat, lon) {
            try {
                const res = await fetchWithTimeout(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&formatted=0`);
                const data = await res.json();
                const d = new Date(data.results.sunset);
                const goldenHour = new Date(d.getTime() - 40 * 60000); // ok 40 min przed zachodem
                return {
                    sunset: d.toLocaleTimeString('pl-PL'),
                    goldenHour: goldenHour.toLocaleTimeString('pl-PL'),
                    isDay: new Date() < d && new Date() > new Date(data.results.sunrise)
                };
            } catch(e) { return { sunset: "?", goldenHour: "?", isDay: true }; }
        }

        // Szacowanie Skali Bortle'a na podstawie urbanizacji
        function estimateBortle(address) {
            if(address.city) return "7-8 (Silne zanieczyszczenie miejskie, widać tylko najjaśniejsze obiekty)";
            if(address.town || address.suburb) return "5-6 (Niebo podmiejskie)";
            if(address.village) return "3-4 (Wiejskie niebo, zarys Drogi Mlecznej)";
            return "1-2 (Ciemne niebo naturalne)";
        }

        // [Tu znajdują się funkcje z poprzedniej wersji - skrócone dla czytelności]
        async function getBaseData(lat, lon) {
            try {
                const resWeather = await fetchWithTimeout(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,surface_pressure,wind_speed_10m&elevation=nan`);
                const weather = await resWeather.json();
                
                const resAir = await fetchWithTimeout(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=european_aqi`);
                const air = await resAir.json();
                
                const resAddr = await fetchWithTimeout(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=18`);
                const addrData = await resAddr.json();
                const addr = addrData.address || {};
                const poi = addr.park || addr.leisure || addr.historic || addr.tourism || addr.amenity || 'Brak danych w promieniu kilkudziesięciu metrów';

                return {
                    temp: weather.current?.temperature_2m || "?", 
                    pressure: weather.current?.surface_pressure || "?",
                    elevation: weather.elevation || "?",
                    aqi: air.current?.european_aqi || "?",
                    poi: poi,
                    road: addr.road || '', city: addr.city || addr.town || addr.village || '', addressRaw: addr
                };
            } catch(e) { return { temp:"?", pressure:"?", elevation:"?", aqi:"?", poi:"?", road:"", city:"", addressRaw:{} }; }
        }

        // Wykonanie pełnego zapisu
        captureBtn.addEventListener('click', async () => {
            captureBtn.disabled = true;
            captureBtn.classList.add('loading');
            statusDiv.innerHTML = "📡 Nawiązywanie połączenia z satelitami GPS...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const date = new Date();
                
                statusDiv.innerHTML = "🌍 Lokalizacja znaleziona.<br>🛰️ Odpytywanie 8 globalnych baz danych (Słońce, NOAA, Radar, Wiki)...";
                
                // Odpytywanie równoległe wszystkich API (maksymalna wydajność)
                const [base, wiki, space, eq, flights, sun] = await Promise.all([
                    getBaseData(lat, lon),
                    getWiki(lat, lon),
                    getSpaceWeather(),
                    getEarthquake(lat, lon),
                    getFlights(lat, lon),
                    getSun(lat, lon)
                ]);

                // Formatowanie metadanych
                const metadata = `
=============================================
             ZAREJESTROWANA CHWILA
=============================================

=== 📍 POZYCJA I KONTEKST ===
GPS: ${lat.toFixed(6)}, ${lon.toFixed(6)} (Wysokość: ${base.elevation} m n.p.m.)
Adres: ${base.road}, ${base.city}
Punkt Orientacyjny (POI): ${base.poi}
Historia wokół (1km): ${wiki}
Mapy Google: https://www.google.com/maps/search/?api=1&query=${lat},${lon}

=== ⏱️ CZAS I ASTRONOMIA ===
Data i czas lokalny: ${date.toLocaleString('pl-PL')}
Pora dnia: ${sun.isDay ? 'Dzień' : 'Noc'} (Zachód słońca: ${sun.sunset})
Złota Godzina dla fotografii (idealne światło): ${sun.goldenHour}
Zanieczyszczenie światłem (Estymata Bortle'a): ${estimateBortle(base.addressRaw)}

=== 🌍 ŚRODOWISKO I KLIMAT ===
Temperatura: ${base.temp} °C
Ciśnienie barometryczne: ${base.pressure} hPa
Jakość powietrza (Indeks AQI): ${base.aqi} (Mniejsze = lepsze)

=== 🚀 AKTYWNOŚĆ ZIEMI I KOSMOSU ===
Ruch lotniczy nad głową: ${flights}
Pogoda Kosmiczna (Burze słoneczne): ${space}
Aktywność sejsmiczna: ${eq}
=============================================
                `.trim();

                statusDiv.innerHTML = "📸 Uśmiechnij się! Robienie zdjęcia i nagrywanie 10 sekund dźwięku otoczenia...";
                
                // Zrobienie zdjęcia
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const photoDataUrl = canvas.toDataURL('image/jpeg');

                // Nagrywanie audio
                audioChunks = [];
                mediaRecorder.start();
                setTimeout(() => {
                    mediaRecorder.stop();
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        
                        // Pobieranie plików do przeglądarki
                        downloadFile(photoDataUrl, `Chwila_Foto_${date.getTime()}.jpg`);
                        downloadFile(URL.createObjectURL(audioBlob), `Chwila_Audio_${date.getTime()}.webm`);
                        downloadFile('data:text/plain;charset=utf-8,' + encodeURIComponent(metadata), `Chwila_Metadane_${date.getTime()}.txt`);
                        
                        statusDiv.innerText = "✅ Gotowe! Pliki zostały zapisane na urządzeniu.\n\n" + metadata;
                        captureBtn.disabled = false;
                        captureBtn.classList.remove('loading');
                        captureBtn.innerText = "Zarejestruj kolejną chwilę";
                    };
                }, 10000);

            }, (err) => {
                statusDiv.innerText = "❌ Błąd GPS: Musisz włączyć lokalizację w telefonie i przyznać uprawnienia przeglądarce.";
                captureBtn.disabled = false;
                captureBtn.classList.remove('loading');
            }, { enableHighAccuracy: true });
        });

        function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        initMedia();
    </script>
</body>
</html>
