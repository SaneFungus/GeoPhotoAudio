
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestrator Chwili ULTIMATE</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background: #0f172a; color: #e2e8f0; }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 5px; }
        p.subtitle { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
        button { background: #0ea5e9; color: white; border: none; padding: 16px 20px; font-size: 16px; font-weight: bold; border-radius: 12px; width: 100%; cursor: pointer; margin-bottom: 20px; transition: background 0.3s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        button:disabled { background: #475569; cursor: not-allowed; color: #94a3b8; }
        video { width: 100%; border-radius: 12px; margin-bottom: 10px; background: #000; border: 2px solid #1e293b; }
        #status { padding: 15px; background: #1e293b; border-radius: 12px; font-size: 13px; white-space: pre-wrap; border-left: 4px solid #38bdf8; line-height: 1.5; height: 250px; overflow-y: auto; }
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>

    <h2>Rejestrator Chwili</h2>
    <p class="subtitle">Wersja Ultimate (Pełne Metadane + Zewnętrzne API)</p>
    
    <video id="camera" autoplay playsinline muted></video>
    <button id="captureBtn">Zarejestruj Chwilę (Zdjęcie, 10s Audio, Mega-Metadane)</button>
    <div id="status">Oczekiwanie na akcję... Naciśnij przycisk, aby rozpocząć rejestrację.</div>

    <script>
        const video = document.getElementById('camera');
        const captureBtn = document.getElementById('captureBtn');
        const statusDiv = document.getElementById('status');
        
        let mediaRecorder;
        let audioChunks = [];

        const fetchWithTimeout = async (url, timeout = 5000) => {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(id);
            return response;
        };

        // 1. Inicjalizacja Mediów
        async function initMedia() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
                video.srcObject = stream;
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
            } catch (err) {
                statusDiv.innerText = "Błąd dostępu do kamery/mikrofonu: " + err.message;
            }
        }

        // Zodiak i Rok Chiński
        function getAstrology(date) {
            const d = date.getDate(), m = date.getMonth() + 1, y = date.getFullYear();
            const zodiacs = ["Koziorożec", "Wodnik", "Ryby", "Baran", "Byk", "Bliźnięta", "Rak", "Lew", "Panna", "Waga", "Skorpion", "Strzelec", "Koziorożec"];
            const lastDays = [19, 18, 20, 19, 20, 20, 22, 22, 22, 22, 21, 21, 19];
            const zodiacSign = d > lastDays[m-1] ? zodiacs[m] : zodiacs[m-1];
            const chineseAnimals = ['Małpa', 'Kogut', 'Pies', 'Świnia', 'Szczur', 'Bawół', 'Tygrys', 'Królik', 'Smok', 'Wąż', 'Koń', 'Koza'];
            return { zodiacSign, chineseYear: chineseAnimals[y % 12] };
        }

        // Faza księżyca
        function getMoonPhase(date) {
            const days = Math.floor((((date.getTime() - new Date(1970, 0, 7, 20, 35, 0).getTime()) / 1000) % 2551443) / 86400);
            if(days < 1 || days > 28) return "Nów";
            if(days < 7) return "Przybywający sierp";
            if(days === 7) return "Pierwsza kwadra";
            if(days < 14) return "Garbata przybywająca";
            if(days === 14 || days === 15) return "Pełnia";
            if(days < 22) return "Garbata ubywająca";
            if(days === 22) return "Ostatnia kwadra";
            return "Ubywający sierp";
        }

        // Pora roku i dnia
        function getTimeDetails(date) {
            const m = date.getMonth() + 1, h = date.getHours();
            return {
                season: m >= 3 && m <= 5 ? "Wiosna" : m >= 6 && m <= 8 ? "Lato" : m >= 9 && m <= 11 ? "Jesień" : "Zima",
                timeOfDay: h >= 5 && h < 8 ? "Świt" : h >= 8 && h < 16 ? "Dzień" : h >= 16 && h < 20 ? "Zmierzch" : "Noc"
            };
        }

        // Strefa czasowa (np. GMT+2)
        function getTimezoneOffsetString(date) {
            const offsetMinutes = date.getTimezoneOffset();
            const sign = offsetMinutes > 0 ? '-' : '+';
            const hours = String(Math.floor(Math.abs(offsetMinutes) / 60)).padStart(2, '0');
            const minutes = String(Math.abs(offsetMinutes) % 60).padStart(2, '0');
            return `GMT${sign}${hours}:${minutes}`;
        }

        // API
        async function getWiki(lat, lon) {
            try {
                const res = await fetchWithTimeout(`https://pl.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=1000&gslimit=4&format=json&origin=*`);
                const data = await res.json();
                if(data.query?.geosearch?.length > 0) return data.query.geosearch.map(i => i.title).join(", ");
                return "Brak danych";
            } catch(e) { return "Brak danych"; }
        }

        async function getSpaceWeather() {
            try {
                const res = await fetchWithTimeout('https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json');
                const data = await res.json();
                return `Indeks Kp = ${data[data.length - 1][1]}`;
            } catch(e) { return "Brak danych"; }
        }

        async function getEarthquake(lat, lon) {
            try {
                let d = new Date(); d.setDate(d.getDate() - 30);
                const res = await fetchWithTimeout(`https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&latitude=${lat}&longitude=${lon}&maxradiuskm=200&starttime=${d.toISOString().split('T')[0]}&limit=1`);
                const data = await res.json();
                if(data.features?.length > 0) return `Mag ${data.features[0].properties.mag}, ${data.features[0].properties.place}`;
                return "Brak wstrząsów (ostatnie 30 dni)";
            } catch(e) { return "Brak danych"; }
        }

        async function getFlights(lat, lon) {
            try {
                const box = 0.3;
                const res = await fetchWithTimeout(`https://opensky-network.org/api/states/all?lamin=${lat-box}&lomin=${lon-box}&lamax=${lat+box}&lomax=${lon+box}`);
                const data = await res.json();
                return data.states?.length > 0 ? `Wykryto ${data.states.length}` : "Brak na radarze";
            } catch(e) { return "Radar niedostępny"; }
        }

        async function getSun(lat, lon) {
            try {
                const res = await fetchWithTimeout(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&formatted=0`);
                const data = await res.json();
                return new Date(new Date(data.results.sunset).getTime() - 40 * 60000).toLocaleTimeString('pl-PL');
            } catch(e) { return "Brak danych"; }
        }

        async function getBaseData(lat, lon) {
            try {
                const resWeather = await fetchWithTimeout(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,surface_pressure,wind_speed_10m,cloudcover&elevation=nan`);
                const weather = await resWeather.json();
                
                const resAddr = await fetchWithTimeout(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=18`);
                const addr = (await resAddr.json()).address || {};

                return {
                    temp: weather.current?.temperature_2m || "?", 
                    pressure: weather.current?.surface_pressure || "?",
                    wind: weather.current?.wind_speed_10m || "?",
                    clouds: weather.current?.cloudcover || "?",
                    elevation: weather.elevation || "?",
                    poi: addr.park || addr.leisure || addr.historic || addr.tourism || addr.amenity || 'Brak danych',
                    road: addr.road || '',
                    suburb: addr.suburb || addr.neighbourhood || '',
                    city_district: addr.city_district || addr.borough || '',
                    city: addr.city || addr.town || addr.village || '',
                    state: addr.state || '',
                    country: addr.country || ''
                };
            } catch(e) { return { temp:"?", pressure:"?", wind:"?", clouds:"?", elevation:"?", poi:"?", road:"", suburb:"", city_district:"", city:"", state:"", country:"" }; }
        }

        // Wykonanie pełnego zapisu
        captureBtn.addEventListener('click', async () => {
            captureBtn.disabled = true;
            captureBtn.classList.add('loading');
            statusDiv.innerHTML = "📡 Nawiązywanie połączenia z satelitami GPS...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const date = new Date();
                
                statusDiv.innerHTML = "🌍 Lokalizacja znaleziona.<br>🛰️ Odpytywanie baz danych (Słońce, NOAA, Radar, Wiki, Meteo)...";
                
                const [base, wiki, space, eq, flights, goldenHour] = await Promise.all([
                    getBaseData(lat, lon), getWiki(lat, lon), getSpaceWeather(),
                    getEarthquake(lat, lon), getFlights(lat, lon), getSun(lat, lon)
                ]);

                const astro = getAstrology(date);
                const timeDetails = getTimeDetails(date);
                const isDST = date.getTimezoneOffset() < Math.max(new Date(date.getFullYear(), 0, 1).getTimezoneOffset(), new Date(date.getFullYear(), 6, 1).getTimezoneOffset());
                const tzOffsetStr = getTimezoneOffsetString(date);

                // Formatowanie metadanych - KOMPLETNE
                const metadata = `
=== POZYCJA ===
GPS: ${lat.toFixed(6)}, ${lon.toFixed(6)} (Wys.: ${base.elevation} m n.p.m.)
Google Maps: https://www.google.com/maps/search/?api=1&query=${lat},${lon}
Punkt Orientacyjny (POI): ${base.poi}
Ulica: ${base.road}
Osiedle: ${base.suburb}
Dzielnica: ${base.city_district}
Miasto: ${base.city}
Region/Województwo: ${base.state}
Kraj: ${base.country}
Część świata/Kontynent: Europa
Planeta/Układ: Ziemia, Układ Słoneczny

=== CZAS ===
Dokładna data i czas: ${date.toLocaleString('pl-PL')}
Strefa czasowa: ${Intl.DateTimeFormat().resolvedOptions().timeZone} (${tzOffsetStr})
Zmiana czasowa (DST): ${isDST ? "Tak (Czas letni)" : "Nie (Czas standardowy)"}
Pora dnia: ${timeDetails.timeOfDay}
Pora roku: ${timeDetails.season}
Faza księżyca: ${getMoonPhase(date)}
Znak zodiaku: ${astro.zodiacSign}
Rok chiński: ${astro.chineseYear}

=== POGODA ===
Temperatura: ${base.temp} °C
Ciśnienie: ${base.pressure} hPa
Wiatr: ${base.wind} km/h
Zachmurzenie: ${base.clouds}%

=== KONTEKST ZEWNĘTRZNY ===
Złota Godzina: ${goldenHour}
Ruch lotniczy nad głową: ${flights}
Kosmos (Burze magnetyczne): ${space}
Sejsmologia (<200km, 30 dni): ${eq}
Historia wokół (1km): ${wiki}
                `.trim();

                statusDiv.innerHTML = "📸 Uśmiechnij się! Robienie zdjęcia i nagrywanie 10 sekund dźwięku otoczenia...";
                
                // Zrobienie zdjęcia
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const photoDataUrl = canvas.toDataURL('image/jpeg');

                // Nagrywanie audio
                audioChunks = [];
                mediaRecorder.start();
                setTimeout(() => {
                    mediaRecorder.stop();
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        
                        // Pobieranie
                        downloadFile(photoDataUrl, `Chwila_Foto_${date.getTime()}.jpg`);
                        downloadFile(URL.createObjectURL(audioBlob), `Chwila_Audio_${date.getTime()}.webm`);
                        downloadFile('data:text/plain;charset=utf-8,' + encodeURIComponent(metadata), `Chwila_Metadane_${date.getTime()}.txt`);
                        
                        statusDiv.innerText = "✅ Gotowe! Pliki zapisane.\n\n" + metadata;
                        captureBtn.disabled = false;
                        captureBtn.classList.remove('loading');
                        captureBtn.innerText = "Zarejestruj kolejną chwilę";
                    };
                }, 10000);

            }, (err) => {
                statusDiv.innerText = "❌ Błąd GPS: Brak lokalizacji.";
                captureBtn.disabled = false;
                captureBtn.classList.remove('loading');
            }, { enableHighAccuracy: true });
        });

        function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        initMedia();
    </script>
</body>
</html>
